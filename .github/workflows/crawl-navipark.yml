# ナビパーク（スターツアメニティー）の定期実行
# 出力は別ファイル(prices-navipark.jsonl)にして push 競合を回避。
name: crawl-navipark

on:
  schedule:
    # 他ワークフローとずらして 2,8,14 UTC に実行
    - cron: "0 2,8,14 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  crawl-navipark:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    concurrency:
      group: crawl-navipark
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run crawl
        env:
          CRAWL_ONLY: "navipark"
          OUT_FILE: "data/prices-navipark.jsonl"
      - name: commit data if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add data/prices-navipark.jsonl data/navipark-crawl-state.json data/navipark-codes.txt
          if ! git diff --cached --quiet; then
            git commit -m "chore: update navipark prices ($(date -u +%Y-%m-%dT%H:%MZ))"
            for i in $(seq 1 6); do
              git pull --no-rebase --no-edit origin main
              if git push; then echo "pushed"; break; fi
              echo "push retry $i"; sleep $((RANDOM % 8 + 3))
              [ "$i" = 6 ] && { echo "push failed after retries"; exit 1; }
            done
          else
            echo "変化なし。コミットしません。"
          fi

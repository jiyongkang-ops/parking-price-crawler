# クラウド定期実行（GitHub Actions）
# 1日3回（JST 9時/15時/21時）に節度をもって料金を収集する。
#   - NPC全国: 毎回 約1,700件を1リクエストで取得
#   - repark全国: 毎回 3,000件をローリング巡回（約2日で全国1巡）→ 1ジョブ約3.3時間
# 収集結果と巡回状態(data/)に変化があればコミットして次回に引き継ぐ。
name: crawl-parking-prices

on:
  schedule:
    # cron は UTC。JST 9/15/21時 = UTC 0/6/12時（6時間間隔でジョブ重複なし）
    - cron: "0 0,6,12 * * *"
  workflow_dispatch: {} # 手動実行も可

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    # repark全国ローリングは長時間（約3.3h）。GitHub の上限6hの手前で打ち切る。
    timeout-minutes: 350
    concurrency:
      group: crawl # 多重起動を防ぐ（節度）
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run crawl
        env:
          CRAWL_ONLY: "npc,repark" # タイムズは crawl-times.yml で別実行
      - run: npm run dashboard # 最新データで dashboard.html を再生成（全社分を集計）
      - run: npm run export # 統一料金CSV(data/parking-latest.csv)を再生成
      - name: commit data if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          # prices.jsonl（価格時系列）と repark-crawl-state.json（巡回位置）を永続化。
          # 状態をコミットしないとローリングが毎回先頭に戻ってしまう。
          git add data/prices.jsonl data/repark-crawl-state.json data/repark-sitemap.xml dashboard.html data/parking-latest.csv
          if ! git diff --cached --quiet; then
            git commit -m "chore: update npc+repark prices ($(date -u +%Y-%m-%dT%H:%MZ))"
            for i in $(seq 1 6); do
              git pull --no-rebase --no-edit origin main
              if git push; then echo "pushed"; break; fi
              echo "push retry $i"; sleep $((RANDOM % 8 + 3))
              [ "$i" = 6 ] && { echo "push failed after retries"; exit 1; }
            done
          else
            echo "変化なし。コミットしません。"
          fi
